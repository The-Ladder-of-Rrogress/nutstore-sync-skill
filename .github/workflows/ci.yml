name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        
    - name: Run tests
      run: |
        pytest tests/ -v
        
    - name: Run syntax check
      run: |
        python -m py_compile nutstore_sync.py
        
    - name: Test import
      run: |
        python -c "from nutstore_sync import NutstoreSync, NutstoreError, ConfigError, APIError; print('Import successful')"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
        
    - name: Run flake8
      run: |
        flake8 nutstore_sync.py --max-line-length=100 --extend-ignore=E203,W503 || true
        
    - name: Check black formatting
      run: |
        black --check nutstore_sync.py || true
